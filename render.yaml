services:
  - type: web
    name: smart-traffic-violation-system
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JPA_DDL_AUTO
        value: update
      - key: JPA_SHOW_SQL
        value: false
      - key: ALLOWED_ORIGINS
        value: https://trafficspringkush.netlify.app,http://localhost:5173,http://127.0.0.1:5173
